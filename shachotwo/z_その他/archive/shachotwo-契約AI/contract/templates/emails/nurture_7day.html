<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><style>body{font-family:sans-serif;color:#333;line-height:1.8;max-width:600px;margin:0 auto;padding:20px;}
.cta{display:inline-block;background:#2563eb;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:bold;}
.offer{background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:16px;margin:16px 0;}
hr{border:none;border-top:1px solid #e9ecef;margin:20px 0;}</style></head>
<body>
<p>{{ company_name }}<br>ご担当者様</p>
<p>最後のご連絡となります。</p>

<div class="offer">
    <strong>今月中のご契約で、初月+2ヶ月目も無料（合計2ヶ月無料）</strong>
</div>

<p>7日間の無料トライアルもご用意しております。</p>
<p style="text-align:center;margin:24px 0;">
    <a href="{{ trial_url }}" class="cta">無料トライアルを始める</a>
</p>
<p>ご不要の場合、今後のご連絡は控えさせていただきます。</p>
<hr>
<p style="font-size:12px;color:#999;">
    <a href="{{ unsubscribe_url }}">配信停止</a>
</p>
</body>
</html>
