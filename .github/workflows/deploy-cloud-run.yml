name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  SERVICE_NAME: shachotwo-api
  ARTIFACT_REGISTRY: asia-northeast1-docker.pkg.dev
  REPOSITORY_NAME: shachotwo

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "${IMAGE}" ./shachotwo-app
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Trivy vulnerability scan (report fixable CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          scanners: vuln

      - name: Push Docker image
        run: docker push "${{ env.IMAGE }}"

      - name: Deploy to Cloud Run
        run: |
          ENV_VARS="ENVIRONMENT=production"
          ENV_VARS="${ENV_VARS},CORS_ORIGINS=https://shachotwo-web-769477129850.asia-northeast1.run.app"

          SECRETS="SUPABASE_URL=SUPABASE_URL:latest"
          SECRETS="${SECRETS},SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_KEY:latest"
          SECRETS="${SECRETS},GEMINI_API_KEY=GEMINI_API_KEY:latest"
          SECRETS="${SECRETS},VOYAGE_API_KEY=VOYAGE_API_KEY:latest"
          SECRETS="${SECRETS},JWT_SECRET=JWT_SECRET:latest"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.IMAGE }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=120 \
            --concurrency=80 \
            --port=8080 \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="${SECRETS}"

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Backend deployed to: ${URL}"

  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/shachotwo-web:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://shachotwo-api-769477129850.asia-northeast1.run.app/api/v1 \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t "${IMAGE}" \
            ./shachotwo-app/frontend
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push "${{ env.IMAGE }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy shachotwo-web \
            --image="${{ env.IMAGE }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --memory=256Mi \
            --cpu=1 \
            --timeout=60 \
            --concurrency=100 \
            --port=3000

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe shachotwo-web \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Frontend deployed to: ${URL}"
