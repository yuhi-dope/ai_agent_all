name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shachotwo-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: shachotwo-app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint with ruff
        run: ruff check .
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v -m "not integration" --import-mode=importlib --ignore=tests/test_real_data_pipeline.py --ignore=tests/workers/connector/test_connector_google_drive.py
        env:
          ENV: local
          ALLOW_SECRET_FALLBACK: "1"
          REQUIRE_AUTH: "false"
          PYTHONPATH: .

