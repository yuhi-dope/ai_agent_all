name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shachotwo-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: shachotwo-app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint with ruff
        run: ruff check .
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v -m "not integration" --import-mode=importlib --ignore=tests/test_real_data_pipeline.py --ignore=tests/workers/connector/test_connector_google_drive.py
        env:
          ENV: local
          ALLOW_SECRET_FALLBACK: "1"
          REQUIRE_AUTH: "false"
          PYTHONPATH: .

  trivy-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t shachotwo-api:scan ./shachotwo-app

      - name: Run Trivy (SARIF report)
        uses: aquasecurity/trivy-action@v0.30.0
        continue-on-error: true
        with:
          image-ref: "shachotwo-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          scanners: "vuln"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy (report fixable CRITICAL)
        uses: aquasecurity/trivy-action@v0.30.0
        continue-on-error: true
        with:
          image-ref: "shachotwo-api:scan"
          format: "table"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          scanners: "vuln"
