# Cloud Build — shachotwo-api (FastAPI backend)
# Usage: gcloud builds submit --config cloudbuild.yaml .

substitutions:
  _TAG: latest

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-api:${_TAG}'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-api:${_TAG}'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'shachotwo-api'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-api:${_TAG}'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=120'
      - '--concurrency=80'
      - '--port=8080'
      - '--set-env-vars=ENVIRONMENT=production'
      - '--set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,VOYAGE_API_KEY=VOYAGE_API_KEY:latest,JWT_SECRET=JWT_SECRET:latest'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-api:${_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY
