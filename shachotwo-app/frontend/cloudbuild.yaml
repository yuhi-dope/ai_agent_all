# Cloud Build — shachotwo-web (Next.js frontend)
# Usage: gcloud builds submit --config cloudbuild.yaml .
# Run from: shachotwo-app/frontend/

substitutions:
  _TAG: latest

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=NEXT_PUBLIC_API_URL=https://shachotwo-api-769477129850.asia-northeast1.run.app/api/v1'
      - '--build-arg=NEXT_PUBLIC_SUPABASE_URL=https://dkkiokjwfcukjjhkiqkn.supabase.co'
      - '--build-arg=NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_0KC-uDVbtHNA5MMRS0ZR-g_1gjZS3kd'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-web:${_TAG}'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-web:${_TAG}'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'shachotwo-web'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-web:${_TAG}'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=60'
      - '--concurrency=100'
      - '--port=3000'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/shachotwo/shachotwo-web:${_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY
