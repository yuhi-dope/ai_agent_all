<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><style>body{font-family:sans-serif;color:#333;line-height:1.8;max-width:600px;margin:0 auto;padding:20px;}

<body>
<p>{{ company_name }}<br>ご担当者様</p>

今後のサービス改善に活用させていただきます。</p>

<div style="text-align:center;margin:24px 0;">
    <a href="{{ survey_url }}?reason=budget" class="btn">予算</a>

    <a href="{{ survey_url }}?reason=competitor" class="btn">他社採用</a>
    <a href="{{ survey_url }}?reason=other" class="btn">その他</a>
</div>

<hr>
<p>杉本 祐陽<br>シャチョツー</p>

</html>
