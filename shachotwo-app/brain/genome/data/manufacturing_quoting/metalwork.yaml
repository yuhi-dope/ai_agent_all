id: metalwork
name: 金属加工
description: 切削・板金・研磨・溶接を中心とする金属部品加工
jsic_codes: ["E-24", "E-25", "E-26", "E-27"]
plugin: null

materials:
  SS400:  {name: 一般構造用鋼, density_kg_m3: 7850, machinability: 1.0, kg_price: 120}
  S45C:   {name: 機械構造用炭素鋼, density_kg_m3: 7850, machinability: 0.9, kg_price: 150}
  S50C:   {name: 機械構造用炭素鋼, density_kg_m3: 7850, machinability: 0.85, kg_price: 160}
  SCM435: {name: クロモリ鋼, density_kg_m3: 7850, machinability: 0.8, kg_price: 200}
  SUS304: {name: ステンレス, density_kg_m3: 7930, machinability: 0.6, kg_price: 400}
  SUS316: {name: ステンレス316, density_kg_m3: 7980, machinability: 0.55, kg_price: 500}
  A5052:  {name: アルミ合金, density_kg_m3: 2680, machinability: 1.3, kg_price: 500}
  A6061:  {name: アルミ合金, density_kg_m3: 2700, machinability: 1.2, kg_price: 550}
  A7075:  {name: 超々ジュラルミン, density_kg_m3: 2800, machinability: 1.0, kg_price: 800}
  C3604:  {name: 快削黄銅, density_kg_m3: 8470, machinability: 1.5, kg_price: 1200}
  C1100:  {name: 純銅, density_kg_m3: 8940, machinability: 1.2, kg_price: 1500}
  POM:    {name: ポリアセタール, density_kg_m3: 1410, machinability: 1.5, kg_price: 800}
  MC901:  {name: MCナイロン, density_kg_m3: 1160, machinability: 1.4, kg_price: 2000}
  PEEK:   {name: PEEK樹脂, density_kg_m3: 1300, machinability: 0.8, kg_price: 15000}

equipment:
  cutting:          {name: 材料切断, charge_rate_yen_hour: 3000, setup_time_min: 15, cycle_time_base_min: 3}
  lathe:            {name: 汎用旋盤, charge_rate_yen_hour: 4000, setup_time_min: 45, cycle_time_base_min: 10}
  cnc_lathe:        {name: CNC旋盤, charge_rate_yen_hour: 6000, setup_time_min: 30, cycle_time_base_min: 8}
  machining_center: {name: マシニングセンタ, charge_rate_yen_hour: 8000, setup_time_min: 45, cycle_time_base_min: 15}
  5axis_mc:         {name: 5軸MC, charge_rate_yen_hour: 12000, setup_time_min: 60, cycle_time_base_min: 20}
  milling:          {name: フライス盤, charge_rate_yen_hour: 4000, setup_time_min: 40, cycle_time_base_min: 12}
  grinder:          {name: 研磨盤, charge_rate_yen_hour: 6000, setup_time_min: 30, cycle_time_base_min: 10}
  wire_cut:         {name: ワイヤーカット, charge_rate_yen_hour: 10000, setup_time_min: 30, cycle_time_base_min: 15}
  edm:              {name: 放電加工, charge_rate_yen_hour: 10000, setup_time_min: 30, cycle_time_base_min: 15}
  press:            {name: プレス機, charge_rate_yen_hour: 5000, setup_time_min: 60, cycle_time_base_min: 5}
  laser:            {name: レーザー加工機, charge_rate_yen_hour: 8000, setup_time_min: 20, cycle_time_base_min: 5}
  welding:          {name: 溶接, charge_rate_yen_hour: 5000, setup_time_min: 20, cycle_time_base_min: 10}
  deburring:        {name: バリ取り, charge_rate_yen_hour: 2500, setup_time_min: 5, cycle_time_base_min: 3}
  inspection:       {name: 検査, charge_rate_yen_hour: 3000, setup_time_min: 10, cycle_time_base_min: 2}

process_routing_rules:
  round:
    base_processes:
      - {equipment_type: cutting, setup_time_min: 15, cycle_time_factor: 1.0}
      - {equipment_type: cnc_lathe, setup_time_min: 30, cycle_time_factor: 1.0}
    conditional_processes:
      - {condition: has_holes, equipment_type: machining_center, setup_time_min: 30, cycle_time_factor: 0.33}
      - {condition: tight_tolerance, equipment_type: grinder, setup_time_min: 30, cycle_time_factor: 1.0}
  block:
    base_processes:
      - {equipment_type: cutting, setup_time_min: 15, cycle_time_factor: 1.0}
      - {equipment_type: machining_center, setup_time_min: 45, cycle_time_factor: 1.0}
    conditional_processes:
      - {condition: tight_tolerance, equipment_type: grinder, setup_time_min: 30, cycle_time_factor: 1.0}
  plate:
    base_processes:
      - {equipment_type: laser, setup_time_min: 20, cycle_time_factor: 1.0}
    conditional_processes:
      - {condition: needs_bending, equipment_type: press, setup_time_min: 30, cycle_time_factor: 0.5}
      - {condition: needs_welding, equipment_type: welding, setup_time_min: 20, cycle_time_factor: 1.0}
  complex:
    base_processes:
      - {equipment_type: cutting, setup_time_min: 15, cycle_time_factor: 1.0}
      - {equipment_type: machining_center, setup_time_min: 60, cycle_time_factor: 1.33}
      - {equipment_type: wire_cut, setup_time_min: 30, cycle_time_factor: 1.0}
    conditional_processes:
      - {condition: tight_tolerance, equipment_type: grinder, setup_time_min: 30, cycle_time_factor: 1.0}

outsource_costs:
  heat_treatment:
    base_cost: 5000
    per_piece_cost: 200
  surface_treatment:
    メッキ:     {base_cost: 3000, per_piece_cost: 500}
    アルマイト:  {base_cost: 3000, per_piece_cost: 300}
    黒染め:     {base_cost: 2000, per_piece_cost: 100}
    塗装:       {base_cost: 3000, per_piece_cost: 400}

cost_params:
  default_overhead_rate: 0.15
  default_profit_rate: 0.15
  rush_multiplier: 1.2
  prototype_multiplier: 1.5
  lot_discount_thresholds:
    - {min_quantity: 100, discount_rate: 0.05}
    - {min_quantity: 500, discount_rate: 0.10}
    - {min_quantity: 1000, discount_rate: 0.15}
